[module/mission_control]
type = custom/script
exec = ~/Projects/linux/scripts/missions/mission_control.sh --display
interval = 1
format = %{F#8aadf4}<label>%{F-}
label = %output%
click-left = ~/Projects/linux/scripts/missions/mission_control.sh --new
click-middle = ~/Projects/linux/scripts/missions/mission_control.sh --pause
click-right = ~/Projects/linux/scripts/missions/mission_control.sh --finish
