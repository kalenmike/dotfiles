hook-1 = echo "%{A3:dunstctl set-paused false && polybar-msg hook dunst 1:}%{T9}%{F5c5f77} Ôá∂ %{F-}%{T-}%{A}" &
click-left = dunstctl history-pop

[module/nordvpn]
type = custom/script
format-padding = 0
format-background = ${colors.background-alt}
format = <label>%{T-}
content-margin = 0
label = %output%
exec = $HOME/Projects/linux/scripts/polybar/check-vpn.sh
interval=2
click-left = notify-send -i "" -a "NordVPN" "NordVPN" "Attempting to connect to VPN" && nordvpn connect
click-right = notify-send -i "" -a "NordVPN" "NordVPN" "Disconnecting from VPN" && nordvpn disconnect

