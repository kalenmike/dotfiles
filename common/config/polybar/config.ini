exec = $HOME/Projects/linux/scripts/polybar/time-until-sleep.sh
interval = 60

[module/wififreq]
type = custom/script
format-padding = 0
format-background = ${colors.background-alt}
format = "<label>"
exec = $HOME/Projects/linux/scripts/polybar/wifi-frequency.sh
interval = 3600

[module/stretch]
type = custom/script
format-padding = 0
format = <label>
label = %output%
exec = $HOME/Projects/linux/scripts/toggle/toggle-stretch-reminders.sh &
click-left = $HOME/Projects/linux/scripts/toggle/toggle-stretch-reminders.sh toggle &
tail=true
interval=10

[module/powerbtn]
type = custom/text
format-background = ${colors.background-alt}
format-padding = 0
format =  %{T10}ůįź• %{T-}
click-left = $HOME/Projects/linux/scripts/polybar/powermenu.sh

[module/test]
type = custom/text
format-background = ${colors.background-alt}
format-padding = 0
format = ${env:HOME:~}

[module/weather]
type = custom/script
label = %output%
format-margin = 0
format-background = ${colors.background-alt}
format-padding = 0
format = "<label>  "
exec = $HOME/Projects/linux/scripts/polybar/weather.sh
interval = 600
click-left = brave-browser https://www.timeanddate.com/moon/spain/valencia
