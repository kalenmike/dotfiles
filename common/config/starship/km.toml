# Use a two-line format
format = """
[╭──](dimmed surface2)$time[─](dimmed surface2)$hostname$directory$git_branch$git_status${custom.nvm_icon} $jobs$cmd_duration
[╰─](dimmed surface2)$character """

palette = 'catppuccin_macchiato'

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
min_time = 2000 # Only show if command takes longer than 2 seconds
show_milliseconds = false
style = "dimmed yellow"
format = " [󱎫 $duration]($style)"

[time]
disabled = false
style = "fg:overlay2 bg:surface0"
format = "[](surface0)[$time]($style)[](surface0)"
time_format = "%H:%M"

[jobs]
symbol = " "
style = "dimmed red"
number_threshold = 1 
format = "[$symbol$number]($style) "

[git_branch]
style = "fg:crust bg:lavender"
format = "[─](dimmed surface2)[](lavender)[$branch]($style)"

[git_status]
style = "fg:crust bg:lavender"
format = "[($all_status$ahead_behind)]($style)[](lavender)"

[directory]
style = "fg:overlay2 bg:surface0"
# These lines ensure no extra "padding" symbols or spaces are added
read_only = ""
home_symbol = "~"
truncation_length = 2
truncation_symbol = "../"
format = "[](surface0)[$path]($style)[](surface0)"

[custom.nvm_icon]
# This only cares about the variable, nothing else.
command = "echo '󰎙'"
when = 'test "$_NVM_LOADED" = "1"'
style = "bold flamingo"
format = "[─](dimmed surface2)[$output]($style)"

[hostname]
ssh_only = true
format = "[](teal)[$hostname]($style)[](teal)[─](dimmed surface2)"
style = "bold bg:teal fg:surface0"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
